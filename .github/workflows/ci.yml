name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: pip install ruff pytest

      - name: Ruff (lint)
        run: ruff check .

      - name: Shell syntax check (bash -n)
        run: |
          set -e
          for f in $(git ls-files '*.sh'); do echo "bash -n $f"; bash -n "$f"; done

      - name: Pytest (CPU-only; no GPU/network)
        run: pytest -q tests/
